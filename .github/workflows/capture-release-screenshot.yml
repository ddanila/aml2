name: Capture Release Screenshot

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to capture
        required: true
        default: v0.1.1

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install capture tools
        run: sudo apt-get update && sudo apt-get install -y unzip mtools qemu-system-x86

      - name: Install Pillow
        run: python3 -m pip install --user pillow

      - name: Capture release screenshot
        run: ./tools/capture_release_help_screenshot.sh "${{ inputs.release_tag }}"

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-screenshot-${{ inputs.release_tag }}
          path: |
            out/release-${{ inputs.release_tag }}-games/*.png
            out/release-${{ inputs.release_tag }}-games/*.ppm
            out/release-${{ inputs.release_tag }}-games/LAUNCHER.CFG
            out/release-${{ inputs.release_tag }}-games/help-screen.log
          if-no-files-found: error
