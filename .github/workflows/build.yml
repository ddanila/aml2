name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dos-build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install build and test tools
        run: brew install zip mtools qemu

      - name: Set up Open Watcom
        run: ./tools/setup_openwatcom.sh

      - name: Build DOS binaries
        run: ./tools/build.sh

      - name: Run sequential regression suite
        run: bash tests/run_all.sh

      - name: Package artifact
        run: ./tools/package_dist.sh

      - name: Upload build zip
        uses: actions/upload-artifact@v7.0.0
        with:
          name: aml2-${{ github.sha }}
          path: out/dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" out/dist/*.zip --clobber
          else
            gh release create "$tag" out/dist/*.zip --draft --generate-notes
          fi
